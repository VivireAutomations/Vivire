<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="brand_assets/Untitled design (17).png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vivire Automations</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green: #8FDA0D;
      --cyan: #2EDDB5;
      --teal: #0B8080;
      --bg: #060E0E;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'Roboto', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* Noise texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* Radial gradient background layers */
    .bg-glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 50%, rgba(46,221,181,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 20% 80%, rgba(11,128,128,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 20%, rgba(143,218,13,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Animated orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: var(--cyan);
      top: -150px; left: -100px;
      animation: orb-drift-1 12s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: var(--green);
      bottom: -100px; right: -80px;
      animation: orb-drift-2 15s ease-in-out infinite alternate;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: var(--teal);
      top: 50%; right: 20%;
      animation: orb-drift-3 10s ease-in-out infinite alternate;
    }

    @keyframes orb-drift-1 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(60px, 80px) scale(1.15); }
    }
    @keyframes orb-drift-2 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(-40px, -60px) scale(1.1); }
    }
    @keyframes orb-drift-3 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, -50px) scale(0.9); }
    }

    /* Animated grid lines */
    .grid-lines {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(46,221,181,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(46,221,181,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* Main content */
    #splash-screen {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      transition: opacity 0.6s ease;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .logo-img {
      width: 200px;
      height: 200px;
      object-fit: contain;
      filter: drop-shadow(0 0 30px rgba(46,221,181,0.45)) drop-shadow(0 0 60px rgba(143,218,13,0.2));
      animation: logo-glow-pulse 3s ease-in-out infinite;
    }

    @keyframes logo-glow-pulse {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(46,221,181,0.4)) drop-shadow(0 0 40px rgba(143,218,13,0.15)); }
      50%       { filter: drop-shadow(0 0 40px rgba(46,221,181,0.7)) drop-shadow(0 0 80px rgba(143,218,13,0.3)); }
    }

    .brand-name {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: clamp(2.8rem, 7vw, 5rem);
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(135deg, #ffffff 0%, var(--cyan) 50%, var(--green) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeInUp 1s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .brand-tagline {
      font-family: 'Roboto', sans-serif;
      font-weight: 300;
      font-size: clamp(0.85rem, 2vw, 1rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      animation: fadeInUp 1s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* Divider line */
    .divider {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, rgba(46,221,181,0.4), transparent);
      margin: 32px 0;
      animation: fadeInUp 1s 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* Enter button */
    .enter-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 18px 48px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--bg);
      background: linear-gradient(135deg, var(--cyan) 0%, var(--green) 100%);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      overflow: hidden;
      animation: fadeInUp 1s 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
      box-shadow:
        0 0 0 1px rgba(46,221,181,0.3),
        0 4px 24px rgba(46,221,181,0.25),
        0 8px 48px rgba(46,221,181,0.1);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.3s ease;
    }

    .enter-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .enter-btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow:
        0 0 0 1px rgba(46,221,181,0.5),
        0 8px 32px rgba(46,221,181,0.4),
        0 16px 64px rgba(46,221,181,0.2);
    }
    .enter-btn:hover::before { opacity: 1; }
    .enter-btn:active { transform: translateY(0) scale(0.98); }

    .enter-btn:focus-visible {
      outline: 2px solid var(--cyan);
      outline-offset: 4px;
    }

    /* Arrow icon */
    .btn-arrow {
      width: 18px;
      height: 18px;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .enter-btn:hover .btn-arrow { transform: translateX(4px); }

    /* Scan line ring around button */
    .btn-ring {
      position: absolute;
      inset: -8px;
      border: 1px solid rgba(46,221,181,0.15);
      border-radius: 8px;
      animation: ring-pulse 2.5s ease-in-out infinite;
    }
    @keyframes ring-pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50%       { opacity: 0.7; transform: scale(1.02); }
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--cyan);
      opacity: 0;
      animation: particle-float linear infinite;
    }
    @keyframes particle-float {
      0%   { opacity: 0;    transform: translateY(100vh) scale(0); }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.4; }
      100% { opacity: 0;    transform: translateY(-20px) scale(1); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Video overlay */
    #video-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    #video-overlay.active {
      display: flex;
    }
    #intro-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Fade transition */
    .fade-out {
      opacity: 0 !important;
      pointer-events: none;
    }
    #splash-screen { transition: opacity 0.5s ease; }
  </style>
</head>
<body>

  <!-- Background layers -->
  <div class="bg-glow"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grid-lines"></div>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <!-- Splash screen -->
  <div id="splash-screen">
    <div class="logo-wrap">
      <img src="brand_assets/Untitled design (17).png" alt="Vivire Logo" class="logo-img" />
      <div class="brand-name">Vivire</div>
      <div class="brand-tagline">Automations</div>
    </div>

    <div class="divider"></div>

    <div style="position:relative; animation: fadeInUp 1s 0.6s cubic-bezier(0.16,1,0.3,1) both;">
      <div class="btn-ring"></div>
      <button class="enter-btn" id="enter-btn" onclick="startIntro()">
        Enter Vivire
        <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Video overlay -->
  <div id="video-overlay">
    <video id="intro-video" playsinline>
      <source src="AI_Logo_Intro_Video_Generation (1).mp4" type="video/mp4" />
    </video>
  </div>

  <script>
    // Generate particles
    const container = document.getElementById('particles');
    const colors = ['#2EDDB5', '#8FDA0D', '#0B8080'];
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (8 + Math.random() * 14) + 's';
      p.style.animationDelay = (Math.random() * 12) + 's';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
      container.appendChild(p);
    }

    function startIntro() {
      const splash = document.getElementById('splash-screen');
      const overlay = document.getElementById('video-overlay');
      const video = document.getElementById('intro-video');

      // Fade out splash
      splash.style.opacity = '0';
      splash.style.pointerEvents = 'none';

      setTimeout(() => {
        overlay.classList.add('active');
        video.play().catch(() => {
          // Autoplay blocked — redirect anyway
          window.location.href = 'index.html';
        });
      }, 400);

      video.addEventListener('ended', () => {
        window.location.href = 'index.html';
      });

      // Safety fallback: if video somehow never fires 'ended'
      video.addEventListener('error', () => {
        window.location.href = 'index.html';
      });
    }
  </script>


</body>
</html>
